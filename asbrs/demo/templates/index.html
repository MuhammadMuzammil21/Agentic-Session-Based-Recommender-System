<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASBRS — Agentic Session-Based Recommender</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 { font-size: 2rem; font-weight: 700; color: #a78bfa; margin-bottom: .5rem; }
    p.subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .card {
      background: #1e1e2e;
      border: 1px solid #2d2d42;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 720px;
      margin-bottom: 1.5rem;
    }
    label { display: block; font-size: .875rem; color: #94a3b8; margin-bottom: .5rem; }
    textarea {
      width: 100%; background: #12121f; border: 1px solid #333355;
      border-radius: 8px; color: #e2e8f0; padding: .75rem;
      font-size: .9rem; resize: vertical; min-height: 100px;
    }
    button {
      margin-top: 1rem; padding: .65rem 1.5rem;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer; font-weight: 600;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    #results { display: none; }
    .intent-badge {
      display: inline-block; padding: .25rem .75rem;
      background: #2d1f6e; border-radius: 20px;
      font-size: .8rem; color: #a78bfa; margin-bottom: 1rem;
    }
    .rec-list { list-style: none; }
    .rec-list li {
      padding: .75rem; border-radius: 8px;
      background: #12121f; margin-bottom: .5rem;
      border-left: 3px solid #7c3aed;
    }
    .rec-title { font-weight: 600; color: #e2e8f0; }
    .rec-exp { font-size: .82rem; color: #94a3b8; margin-top: .25rem; }
    #status { color: #fbbf24; font-size: .9rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <h1>⚡ ASBRS Demo</h1>
  <p class="subtitle">Agentic Session-Based Recommender System · Amazon Electronics</p>

  <div class="card">
    <label for="session-input">Enter item ASINs or titles (one per line)</label>
    <textarea id="session-input" placeholder="B08N5LNQCX&#10;B07ZPKBL9V&#10;B09G3HRMVB"></textarea>
    <button id="recommend-btn" onclick="getRecommendations()">Get Recommendations</button>
    <div id="status"></div>
  </div>

  <div class="card" id="results">
    <div class="intent-badge" id="intent-badge">Intent: —</div>
    <p id="rationale" style="color:#94a3b8; font-size:.875rem; margin-bottom:1rem;"></p>
    <ul class="rec-list" id="rec-list"></ul>
  </div>

  <script>
    async function getRecommendations() {
      const raw = document.getElementById("session-input").value.trim();
      const items = raw.split("\n").map(s => s.trim()).filter(Boolean);
      if (!items.length) { alert("Please enter at least one item."); return; }

      document.getElementById("status").textContent = "⏳ Computing recommendations…";
      document.getElementById("results").style.display = "none";

      try {
        const res = await fetch("/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_items: items }),
        });
        const data = await res.json();
        document.getElementById("status").textContent = "";
        renderResults(data);
      } catch (err) {
        document.getElementById("status").textContent = "❌ Error: " + err.message;
      }
    }

    function renderResults(data) {
      document.getElementById("intent-badge").textContent = "Intent: " + (data.intent || "—");
      document.getElementById("rationale").textContent = data.rationale || "";

      const list = document.getElementById("rec-list");
      list.innerHTML = "";
      (data.recommendations || []).forEach((r, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="rec-title">${i + 1}. ${r.title || r.item_idx}</div>
          <div class="rec-exp">${r.explanation || ""}</div>
        `;
        list.appendChild(li);
      });

      document.getElementById("results").style.display = "block";
    }
  </script>
</body>
</html>
